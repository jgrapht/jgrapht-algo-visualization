server {
    listen       8080 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Cache the HTML for a minute — the visualization is self-contained, so
    # the only resource we serve is the one HTML file.
    location / {
        add_header Cache-Control "public, max-age=60";
        try_files $uri $uri/ =404;
    }

    # Defence in depth — no directory listing, no server tokens.
    autoindex off;
    server_tokens off;

    # Static file: no PHP, no CGI; nothing to proxy or upstream.
    location ~ /\. { deny all; }
}
